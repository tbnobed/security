# Preserve X-Forwarded-Proto from an outer TLS-terminating proxy (e.g. the
# reverse proxy serving HTTPS in front of this container); fall back to this
# server's own scheme when we're the edge. Needed so the api can build correct
# https:// approval links from the request origin when APP_BASE_URL is unset.
map $http_x_forwarded_proto $client_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;

    # Visitor photos are base64-posted through /api (express caps JSON at 10mb).
    client_max_body_size 12m;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API traffic to the api service. The original /api/... path is passed
    # through unchanged (the Express app mounts its router at /api).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_proto;
        proxy_read_timeout 60s;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
