openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Studio Guest Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: guests
    description: Guest check-in/out operations
  - name: preregistrations
  - name: approvals
    description: Pre-registration operations
  - name: watchlist
    description: Watchlist management
  - name: audit
    description: Audit log operations
  - name: users
    description: User management
  - name: dashboard
    description: Dashboard summary data
  - name: studios
    description: Studio location management
  - name: alerts
    description: Email alert recipient configuration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /guests:
    get:
      operationId: listGuests
      tags: [guests]
      summary: List active guests (currently on-site)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, checked_out, all]
          description: Filter by status
        - name: host
          in: query
          schema:
            type: string
        - name: company
          in: query
          schema:
            type: string
        - name: site
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guest"
    post:
      operationId: createGuest
      tags: [guests]
      summary: Check in a new guest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestInput"
      responses:
        "201":
          description: Guest checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
        "403":
          description: Guest on watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistAlert"

  /guests/{id}:
    get:
      operationId: getGuest
      tags: [guests]
      summary: Get a single guest record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Guest record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
        "404":
          description: Not found
    patch:
      operationId: updateGuest
      tags: [guests]
      summary: Update guest record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestUpdate"
      responses:
        "200":
          description: Updated guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /guests/{id}/checkout:
    post:
      operationId: checkoutGuest
      tags: [guests]
      summary: Check out a guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Guest checked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
        "404":
          description: Not found

  /guests/{id}/badge:
    get:
      operationId: getGuestBadge
      tags: [guests]
      summary: Get badge data for printing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Badge data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadgeData"

  /guests/{id}/print-badge:
    post:
      operationId: markBadgePrinted
      tags: [guests]
      summary: Mark a guest's badge as printed at the security desk
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
        "404":
          description: Not found

  /guests/search:
    get:
      operationId: searchGuests
      tags: [guests]
      summary: Search guests by name or badge ID for checkout
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guest"

  /guests/history:
    get:
      operationId: listGuestHistory
      tags: [guests]
      summary: Paginated log of all visits (check-ins and check-outs)
      parameters:
        - name: q
          in: query
          description: Search by guest name, badge ID, or company
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, checked_out, all]
          description: Filter by visit status (default all)
        - name: from
          in: query
          description: Only visits checked in on or after this date (YYYY-MM-DD)
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        - name: to
          in: query
          description: Only visits checked in on or before this date (YYYY-MM-DD)
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        - name: sortBy
          in: query
          description: Column to sort by (default checkinAt)
          schema:
            type: string
            enum: [name, company, hostName, badgeId, checkinAt, checkoutAt]
            default: checkinAt
        - name: sortDir
          in: query
          description: Sort direction (default desc)
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          description: 1-based page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Paginated visit history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestHistoryList"

  /guests/overdue:
    get:
      operationId: listOverdueGuests
      tags: [guests]
      summary: List guests past their expected departure time
      responses:
        "200":
          description: Overdue guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guest"

  /preregistrations:
    get:
      operationId: listPreregistrations
      tags: [preregistrations]
      summary: List pre-registered guests
      parameters:
        - name: date
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Filter by date (YYYY-MM-DD), defaults to today
      responses:
        "200":
          description: Pre-registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Preregistration"
    post:
      operationId: createPreregistration
      tags: [preregistrations]
      summary: Pre-register an expected guest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreregistrationInput"
      responses:
        "201":
          description: Pre-registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preregistration"

  /preregistrations/{id}:
    delete:
      operationId: deletePreregistration
      tags: [preregistrations]
      summary: Delete a pre-registration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /preregistrations/{id}/convert:
    post:
      operationId: convertPreregistration
      tags: [preregistrations]
      summary: Convert a pre-registration to an active check-in
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvertPreregistrationInput"
      responses:
        "201":
          description: Guest checked in from pre-registration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /public/preregistrations:
    post:
      operationId: createPublicPreregistration
      tags: [preregistrations]
      summary: Submit a visitor self-service pre-registration (no authentication)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicPreregistrationInput"
      responses:
        "201":
          description: Pre-registration submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preregistration"

  /approval-workflow:
    get:
      operationId: getApprovalWorkflow
      tags: [approvals]
      summary: Get the pre-registration approval workflow configuration (admin)
      responses:
        "200":
          description: Current workflow configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalWorkflow"
    put:
      operationId: updateApprovalWorkflow
      tags: [approvals]
      summary: Update the approval workflow (admin). Null approver1 disables approvals.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalWorkflowInput"
      responses:
        "200":
          description: Updated workflow configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalWorkflow"

  /approvals/pending:
    get:
      operationId: listPendingApprovals
      tags: [approvals]
      summary: All pre-registrations awaiting approval (any operator may view)
      responses:
        "200":
          description: >
            All pending approvals. `canDecide` is true only on rows whose
            current-stage approver is the signed-in user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingApproval"

  /approvals/denied:
    get:
      operationId: listDeniedApprovals
      tags: [approvals]
      summary: Recently denied pre-registrations (any operator may view)
      responses:
        "200":
          description: Denied pre-registrations, most recent decision first (max 50)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeniedApproval"

  /approvals/{id}/decide:
    post:
      operationId: decideApproval
      tags: [approvals]
      summary: Approve or deny a pending pre-registration (current-stage approver only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionInput"
      responses:
        "200":
          description: Updated pre-registration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preregistration"

  /approvals/token/{token}:
    get:
      operationId: getApprovalByToken
      tags: [approvals]
      summary: Look up a pending approval by email token (no authentication)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval details for the token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalTokenInfo"

  /approvals/token/{token}/decide:
    post:
      operationId: decideApprovalByToken
      tags: [approvals]
      summary: Approve or deny via email token (no authentication, single-use)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionInput"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalTokenInfo"

  /studios:
    get:
      operationId: listStudios
      tags: [studios]
      summary: List studio locations (public, used by the pre-registration form)
      responses:
        "200":
          description: Studios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Studio"
    post:
      operationId: createStudio
      tags: [studios]
      summary: Create a studio location (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudioInput"
      responses:
        "201":
          description: Studio created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Studio"

  /studios/{id}:
    delete:
      operationId: deleteStudio
      tags: [studios]
      summary: Delete a studio location (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /alert-recipients:
    get:
      operationId: listAlertRecipients
      tags: [alerts]
      summary: List configured alert recipients (admin only)
      responses:
        "200":
          description: Alert recipients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertRecipient"
    post:
      operationId: createAlertRecipient
      tags: [alerts]
      summary: Add an alert recipient for an event type (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertRecipientInput"
      responses:
        "201":
          description: Recipient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertRecipient"

  /alert-recipients/{id}:
    delete:
      operationId: deleteAlertRecipient
      tags: [alerts]
      summary: Remove an alert recipient (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /alert-status:
    get:
      operationId: getAlertStatus
      tags: [alerts]
      summary: Whether outbound email is configured on the server (admin only)
      responses:
        "200":
          description: Alert delivery status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertStatus"

  /watchlist:
    get:
      operationId: listWatchlist
      tags: [watchlist]
      summary: List all watchlist entries
      responses:
        "200":
          description: Watchlist entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistEntry"
    post:
      operationId: createWatchlistEntry
      tags: [watchlist]
      summary: Add a person to the watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistEntryInput"
      responses:
        "201":
          description: Watchlist entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistEntry"

  /watchlist/{id}:
    delete:
      operationId: deleteWatchlistEntry
      tags: [watchlist]
      summary: Remove a person from the watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /watchlist/check:
    get:
      operationId: checkWatchlist
      tags: [watchlist]
      summary: Check if a name matches the watchlist
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Watchlist check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistCheckResult"

  /known-guests:
    get:
      operationId: listKnownGuests
      tags: [known-guests]
      summary: List known (returning) guests with visit stats
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: vip
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          description: 1-based page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Known guests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnownGuestList"

  /known-guests/{id}:
    patch:
      operationId: updateKnownGuest
      tags: [known-guests]
      summary: Update a known guest (name, company, contact, VIP flag)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnownGuestUpdate"
      responses:
        "200":
          description: Updated known guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnownGuest"
        "404":
          description: Not found
        "409":
          description: Another known guest already has that name
    delete:
      operationId: deleteKnownGuest
      tags: [known-guests]
      summary: Delete a known guest profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /known-guests/{id}/visits:
    get:
      operationId: listKnownGuestVisits
      tags: [known-guests]
      summary: Visit history for a known guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Past visits (guest records)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guest"
        "404":
          description: Not found

  /kiosk/preregistrations:
    get:
      operationId: kioskListPreregistrations
      tags: [kiosk]
      summary: Search today's pending pre-registrations by guest name (kiosk self check-in)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        "200":
          description: Matching expected guests (limited fields)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KioskPreregistration"
        "400":
          description: Invalid query

  /kiosk/checkin:
    post:
      operationId: kioskCheckin
      tags: [kiosk]
      summary: Self check-in for an expected guest (converts the pre-registration)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KioskCheckinRequest"
      responses:
        "201":
          description: Guest checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
        "404":
          description: Pre-registration not found or no longer pending
        "403":
          description: Entry requires assistance at the security desk

  /client/employees:
    get:
      operationId: listRosterEmployees
      tags: [client]
      summary: List the signed-in client's employee roster
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientEmployee"
    post:
      operationId: createRosterEmployee
      tags: [client]
      summary: Add an employee to the roster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientEmployeeInput"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEmployee"
        "409":
          description: An employee with this name already exists

  /client/employees/import:
    post:
      operationId: importRosterEmployees
      tags: [client]
      summary: Bulk-import employees (parsed CSV rows)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientEmployeeImportRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEmployeeImportResult"

  /client/employees/{id}:
    patch:
      operationId: updateRosterEmployee
      tags: [client]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientEmployeeUpdate"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientEmployee"
        "404":
          description: Not found
        "409":
          description: An employee with this name already exists
    delete:
      operationId: deleteRosterEmployee
      tags: [client]
      summary: Remove an employee from the roster
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /client/employees/{id}/visits:
    get:
      operationId: listRosterEmployeeVisits
      tags: [client]
      summary: Visit history for one of the client's employees
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Past visits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientVisit"
        "404":
          description: Not found

  /client/preregistrations/bulk:
    post:
      operationId: clientBulkPreregister
      tags: [client]
      summary: Pre-register multiple roster employees for a visit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientBulkPreregisterRequest"
      responses:
        "201":
          description: Bulk pre-registration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientBulkPreregisterResult"
        "400":
          description: Invalid request

  /client/visits/today:
    get:
      operationId: listClientVisitsToday
      tags: [client]
      summary: Today's visit status for the client's pre-registered employees
      responses:
        "200":
          description: Today's visits with live status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientVisit"

  /audit:
    get:
      operationId: listAuditLog
      tags: [audit]
      summary: List audit log entries
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        - name: endDate
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        - name: guestId
          in: query
          schema:
            type: integer
        - name: operatorId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"

  /audit/export:
    get:
      operationId: exportAuditLog
      tags: [audit]
      summary: Export audit log as CSV
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
      responses:
        "200":
          description: CSV export
          content:
            text/csv:
              schema:
                type: string

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate with email and password; establishes a session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Destroy the current session
      responses:
        "204":
          description: Logged out

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all system users (admin only)
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new system user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current authenticated user profile and role
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user's display name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppUserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /users/{clerkId}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (admin only)
      parameters:
        - name: clerkId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /users/{clerkId}/password:
    patch:
      operationId: resetUserPassword
      tags: [users]
      summary: Reset a user's password (admin only)
      parameters:
        - name: clerkId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get live dashboard counts and stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent check-in/out activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  /productions/today:
    get:
      operationId: getProductionsToday
      tags: [dashboard]
      summary: List studio productions/bookings scheduled for today (proxied from the external bookings API)
      responses:
        "200":
          description: Today's productions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductionBooking"

  /settings/branding:
    get:
      operationId: getBrandingSettings
      tags: [settings]
      summary: Get app branding settings (badge logo)
      responses:
        "200":
          description: Branding settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandingSettings"

  /settings/badge-logo:
    put:
      operationId: updateBadgeLogo
      tags: [settings]
      summary: Upload/replace the badge logo (admin only, base64 image)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUpload"
      responses:
        "200":
          description: Badge logo updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandingSettings"
    delete:
      operationId: deleteBadgeLogo
      tags: [settings]
      summary: Remove the uploaded badge logo (admin only)
      responses:
        "204":
          description: Badge logo removed

  /scan-sessions:
    post:
      operationId: createScanSession
      tags: [scan]
      summary: Create a short-lived ID-scan session (operator; desk shows the QR)
      responses:
        "201":
          description: Scan session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanSession"

  /scan-sessions/{id}:
    get:
      operationId: getScanSession
      tags: [scan]
      summary: Poll a scan session for its result (operator)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scan session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanSessionState"
        "404":
          description: Unknown or expired session
    delete:
      operationId: cancelScanSession
      tags: [scan]
      summary: Cancel a scan session, invalidating its QR token (operator; idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session cancelled (or already gone)

  /scan-sessions/{id}/submit:
    post:
      operationId: submitScanResult
      tags: [scan]
      summary: Submit scanned ID data from the paired phone (token-authenticated by session id)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanSubmission"
      responses:
        "204":
          description: Scan result accepted
        "404":
          description: Unknown or expired session
        "409":
          description: Session already completed

  /photos:
    post:
      operationId: uploadPhoto
      tags: [guests]
      summary: Upload a guest photo (base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUpload"
      responses:
        "201":
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Guest:
      type: object
      required:
        - id
        - name
        - company
        - hostName
        - purposeOfVisit
        - site
        - status
        - checkinAt
        - badgeId
      properties:
        id:
          type: integer
        badgeId:
          type: string
        name:
          type: string
        company:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        hostName:
          type: string
        purposeOfVisit:
          type: string
        site:
          type: string
          description: "Dallas/The Plex, Tustin, Nashville"
        status:
          type: string
          enum: [active, checked_out]
        checkinAt:
          type: string
          format: date-time
        checkoutAt:
          type: ["string", "null"]
          format: date-time
        expectedDeparture:
          type: ["string", "null"]
          format: date-time
        photoUrl:
          type: ["string", "null"]
        checkedInByClerkId:
          type: ["string", "null"]
        checkedOutByClerkId:
          type: ["string", "null"]
        preregistrationId:
          type: ["integer", "null"]
        studios:
          type: array
          items:
            type: string
        checkinSource:
          type: string
          enum: [desk, kiosk]
          description: "Where the check-in originated: 'desk' (operator) or 'kiosk' (guest self check-in)."
        badgePrintedAt:
          type: ["string", "null"]
          format: date-time
          description: "When the badge was printed at the security desk; null means it still needs printing."
        timeOnSiteMinutes:
          type: ["integer", "null"]
        isOverdue:
          type: boolean

    GuestInput:
      type: object
      required:
        - name
        - company
        - hostName
        - purposeOfVisit
        - site
      properties:
        name:
          type: string
          minLength: 1
        company:
          type: string
          minLength: 1
        phone:
          type: string
        email:
          type: string
        hostName:
          type: string
          minLength: 1
        purposeOfVisit:
          type: string
          minLength: 1
        site:
          type: string
          minLength: 1
        expectedDeparture:
          type: string
          format: date-time
        photoUrl:
          type: string
        preregistrationId:
          type: integer
        studios:
          type: array
          items:
            type: string

    GuestUpdate:
      type: object
      properties:
        name:
          type: string
        company:
          type: string
        phone:
          type: string
        email:
          type: string
        hostName:
          type: string
        purposeOfVisit:
          type: string
        site:
          type: string
        expectedDeparture:
          type: string
          format: date-time
        photoUrl:
          type: string

    BadgeData:
      type: object
      required:
        - badgeId
        - guestName
        - hostName
        - checkinAt
        - site
      properties:
        badgeId:
          type: string
        guestName:
          type: string
        company:
          type: string
        hostName:
          type: string
        checkinAt:
          type: string
          format: date-time
        site:
          type: string
        studios:
          type: array
          items:
            type: string
        photoUrl:
          type: ["string", "null"]

    Preregistration:
      type: object
      required:
        - id
        - guestName
        - company
        - hostName
        - expectedArrival
        - site
        - status
      properties:
        id:
          type: integer
        guestName:
          type: string
        company:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        hostName:
          type: string
        purposeOfVisit:
          type: ["string", "null"]
        site:
          type: string
        expectedArrival:
          type: string
          format: date-time
        expectedDeparture:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
          enum: [pending, converted, cancelled]
        createdByClerkId:
          type: ["string", "null"]
        convertedGuestId:
          type: ["integer", "null"]
        studios:
          type: array
          items:
            type: string
        approvalStatus:
          type: string
          enum: [approved, pending, denied]
        approvalStage:
          type: ["integer", "null"]
          description: 1 or 2 while approvalStatus is pending
        lateRegistration:
          type: boolean
          description: Registered less than 4 hours before expected arrival

    PendingApproval:
      allOf:
        - $ref: "#/components/schemas/Preregistration"
        - type: object
          required: [canDecide, awaitingApproverName]
          properties:
            canDecide:
              type: boolean
              description: True when the signed-in user is the current-stage approver
            awaitingApproverName:
              type: ["string", "null"]
              description: Display name of the approver this request is currently waiting on

    DeniedApproval:
      allOf:
        - $ref: "#/components/schemas/Preregistration"
        - type: object
          required: [deniedByName, deniedAt]
          properties:
            deniedByName:
              type: ["string", "null"]
              description: Display name of the approver who denied the request
            deniedAt:
              type: ["string", "null"]
              format: date-time

    ApprovalWorkflow:
      type: object
      required: [approver1Id, approver2Id, approver1Name, approver2Name, enabled]
      properties:
        approver1Id:
          type: ["string", "null"]
        approver2Id:
          type: ["string", "null"]
        approver1Name:
          type: ["string", "null"]
        approver2Name:
          type: ["string", "null"]
        enabled:
          type: boolean
          description: True when at least a 1st approver is configured

    ApprovalWorkflowInput:
      type: object
      required: [approver1Id, approver2Id]
      properties:
        approver1Id:
          type: ["string", "null"]
        approver2Id:
          type: ["string", "null"]

    ApprovalDecisionInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [approve, deny]

    ApprovalTokenInfo:
      type: object
      required: [state, stage, guestName, company, hostName, expectedArrival, studios, lateRegistration]
      properties:
        state:
          type: string
          enum: [pending, approved, denied, superseded]
          description: superseded = this stage was already decided or the token is no longer current
        stage:
          type: integer
        guestName:
          type: string
        company:
          type: string
        hostName:
          type: string
        purposeOfVisit:
          type: ["string", "null"]
        expectedArrival:
          type: string
          format: date-time
        expectedDeparture:
          type: ["string", "null"]
          format: date-time
        studios:
          type: array
          items:
            type: string
        lateRegistration:
          type: boolean

    PreregistrationInput:
      type: object
      required:
        - guestName
        - company
        - hostName
        - expectedArrival
        - site
      properties:
        guestName:
          type: string
          minLength: 1
        company:
          type: string
        phone:
          type: string
        email:
          type: string
        hostName:
          type: string
          minLength: 1
        purposeOfVisit:
          type: string
        site:
          type: string
          minLength: 1
        expectedArrival:
          type: string
          format: date-time
        expectedDeparture:
          type: string
          format: date-time
        studios:
          type: array
          items:
            type: string

    ConvertPreregistrationInput:
      type: object
      properties:
        photoUrl:
          type: string

    KnownGuest:
      type: object
      required:
        - id
        - name
        - isVip
        - visitCount
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        company:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        isVip:
          type: boolean
        visitCount:
          type: integer
        lastVisitAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    GuestHistoryList:
      type: object
      required:
        - items
        - total
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Guest"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    KnownGuestList:
      type: object
      required:
        - items
        - total
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/KnownGuest"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    KnownGuestUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        company:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        isVip:
          type: boolean

    WatchlistEntry:
      type: object
      required:
        - id
        - name
        - reason
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        company:
          type: ["string", "null"]
        reason:
          type: string
        action:
          type: string
          enum: [flag, block]
        createdAt:
          type: string
          format: date-time
        addedByClerkId:
          type: ["string", "null"]

    WatchlistEntryInput:
      type: object
      required:
        - name
        - reason
      properties:
        name:
          type: string
          minLength: 1
        company:
          type: string
        reason:
          type: string
          minLength: 1
        action:
          type: string
          enum: [flag, block]

    WatchlistCheckResult:
      type: object
      required:
        - matched
      properties:
        matched:
          type: boolean
        entries:
          type: array
          items:
            $ref: "#/components/schemas/WatchlistEntry"

    WatchlistAlert:
      type: object
      required:
        - message
        - entries
      properties:
        message:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/WatchlistEntry"

    AuditEntry:
      type: object
      required:
        - id
        - eventType
        - guestId
        - guestName
        - operatorClerkId
        - operatorName
        - timestamp
      properties:
        id:
          type: integer
        eventType:
          type: string
          enum: [checkin, checkout, preregistration, watchlist_flag, watchlist_block, user_created, role_changed, password_reset, known_guest_vip, known_guest_edited, known_guest_deleted, client_employee_added, client_employee_edited, client_employee_deleted, client_employees_imported, badge_logo_updated, badge_logo_removed, prereg_approved, prereg_denied, approval_workflow_updated]
        guestId:
          type: ["integer", "null"]
        guestName:
          type: string
        operatorClerkId:
          type: string
        operatorName:
          type: string
        timestamp:
          type: string
          format: date-time
        metadata:
          type: ["string", "null"]
          description: JSON string of additional context

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    AppUser:
      type: object
      required:
        - clerkId
        - role
        - createdAt
      properties:
        clerkId:
          type: string
        displayName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        role:
          type: string
          enum: [security, admin, kiosk, client]
        companyName:
          type: ["string", "null"]
          description: Company the account belongs to (client role only)
        notifyEmail:
          type: ["string", "null"]
          description: Email that receives check-in notifications (client role only)
        createdAt:
          type: string
          format: date-time

    AppUserInput:
      type: object
      required:
        - email
        - password
        - role
      properties:
        email:
          type: string
          format: email
          minLength: 3
          description: Login email; must be unique (case-insensitive)
        password:
          type: string
          minLength: 8
          description: Initial password for the operator
        displayName:
          type: string
        role:
          type: string
          enum: [security, admin, kiosk, client]
        companyName:
          type: string
          description: Required when role is client
        notifyEmail:
          type: string
          format: email
          description: Optional notification email for client accounts (defaults to login email)

    ResetPasswordInput:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          minLength: 8

    AppUserUpdate:
      type: object
      properties:
        displayName:
          type: string

    RoleUpdate:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum: [security, admin, kiosk, client]

    ClientEmployee:
      type: object
      required:
        - id
        - name
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        title:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ClientEmployeeInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        title:
          type: string
        phone:
          type: string
        email:
          type: string

    ClientEmployeeUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        title:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]

    ClientEmployeeImportRequest:
      type: object
      required:
        - rows
      properties:
        rows:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/ClientEmployeeInput"

    ClientEmployeeImportResult:
      type: object
      required:
        - imported
        - merged
        - skipped
        - errors
      properties:
        imported:
          type: integer
        merged:
          type: integer
          description: Rows merged into an existing employee with the same name (new non-empty fields win)
        skipped:
          type: integer
          description: Deprecated — merge now happens instead of skipping; kept for compatibility (always 0)
        errors:
          type: array
          items:
            type: object
            required:
              - row
              - message
            properties:
              row:
                type: integer
                description: 1-based index into the submitted rows
              message:
                type: string

    ClientBulkPreregisterRequest:
      type: object
      required:
        - employeeIds
        - hostName
        - site
        - expectedArrival
      properties:
        site:
          type: string
          minLength: 1
        employeeIds:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: integer
        hostName:
          type: string
          minLength: 1
        purposeOfVisit:
          type: string
        expectedArrival:
          type: string
          format: date-time
        expectedDeparture:
          type: string
          format: date-time
        studios:
          type: array
          items:
            type: string

    ClientBulkPreregisterResult:
      type: object
      required:
        - created
        - preregistrations
      properties:
        created:
          type: integer
        preregistrations:
          type: array
          items:
            $ref: "#/components/schemas/Preregistration"

    ClientVisit:
      type: object
      required:
        - preregistrationId
        - guestName
        - status
        - expectedArrival
      properties:
        preregistrationId:
          type: integer
        clientEmployeeId:
          type: ["integer", "null"]
        guestName:
          type: string
        hostName:
          type: ["string", "null"]
        purposeOfVisit:
          type: ["string", "null"]
        studios:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [expected, on_site, checked_out]
        approvalStatus:
          type: string
          enum: [approved, pending, denied]
        lateRegistration:
          type: boolean
        expectedArrival:
          type: string
          format: date-time
        checkinAt:
          type: ["string", "null"]
          format: date-time
        checkoutAt:
          type: ["string", "null"]
          format: date-time
        badgeId:
          type: ["string", "null"]
          description: Badge ID issued at check-in (null while the visit is still expected)

    KioskPreregistration:
      type: object
      required:
        - id
        - guestName
        - company
        - hostName
        - expectedArrival
      properties:
        id:
          type: integer
        guestName:
          type: string
        company:
          type: string
        hostName:
          type: string
        expectedArrival:
          type: string
          format: date-time

    KioskCheckinRequest:
      type: object
      required:
        - preregistrationId
      properties:
        preregistrationId:
          type: integer
        photoUrl:
          type: ["string", "null"]

    DashboardSummary:
      type: object
      required:
        - activeGuestCount
        - todayCheckins
        - todayCheckouts
        - overdueCount
        - siteBreakdown
        - expectedTodayCount
      properties:
